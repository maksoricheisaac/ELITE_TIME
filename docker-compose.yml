services:

  # ── Backend NestJS ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elitetime-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: ${DATABASE_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_SOCKET_TOKEN: ${INTERNAL_SOCKET_TOKEN}
      NEXT_ALLOWED_ORIGINS: ${NEXT_ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # LDAP
      LDAP_URL: ${LDAP_URL}
      LDAP_BIND_DN: ${LDAP_BIND_DN}
      LDAP_PWD: ${LDAP_PWD}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      # SMTP / Microsoft Graph
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      GRAPH_SENDER_EMAIL: ${GRAPH_SENDER_EMAIL}
      # IA / Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    expose:
      - "4000"
    networks:
      - elitetime-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend Next.js ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_ALLOWED_ORIGINS: ${NEXT_ALLOWED_ORIGINS}
    container_name: elitetime-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      # API interne (server-side Next.js → NestJS, sans passer par le proxy)
      API_URL: http://backend:4000/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXT_ALLOWED_ORIGINS: ${NEXT_ALLOWED_ORIGINS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_SOCKET_TOKEN: ${INTERNAL_SOCKET_TOKEN}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - elitetime-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Reverse proxy nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: elitetime-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - elitetime-net

networks:
  elitetime-net:
    driver: bridge
